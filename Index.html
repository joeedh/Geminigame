<script type="module">
const apiKey = ""; 

const TILE_SIZE = 64;
const MAP_SIZE = 40; 
const MAP_WIDTH = MAP_SIZE * TILE_SIZE;
const MAP_HEIGHT = MAP_SIZE * TILE_SIZE;
const UNIT_MOVE_SPEED = 2.4; 
const STRIDE_LENGTH = 14; 

let resources = { aether: 500 };
let units = [];
let buildings = [];
let camera = { x: 0, y: 0 };
let interactionMode = 'pan';
let selection = { startX: 0, startY: 0, active: false, units: [] };

let tilemap = [];
let lastTheme = "";
let lastTilesetImg = null; 
let assets = {
    tiles: [],     
    soldierSheet: null,
    base: null,
    soldierFrames: [],
    baseReady: false
};

let lastTouch = null;
let touchStartTime = 0;
let initialized = false;

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function showError(msg) {
    const box = document.getElementById('error-box');
    const label = document.getElementById('error-message');
    label.innerText = msg;
    box.classList.remove('hidden');
    setTimeout(() => box.classList.add('hidden'), 5000);
}

async function apiFetch(url, options) {
    const delays = [1000, 2000, 4000, 8000, 16000];
    for (let i = 0; i <= delays.length; i++) {
        try {
            const response = await fetch(url, options);
            const data = await response.json();
            if (response.ok) return data;
            if (i === delays.length) throw new Error(data.error?.message || "Generation failed.");
        } catch (e) {
            if (i === delays.length) throw e;
        }
        await new Promise(r => setTimeout(r, delays[i]));
    }
}

function init() {
    if (initialized) return;
    initialized = true;

    resize();
    window.addEventListener('resize', resize);
    generateMapData();

    buildings = [{ type: 'base', x: 800, y: 800, hp: 1000 }];
    units = [];
    for(let i=0; i<3; i++) {
        units.push({ 
            type: 'worker', 
            x: 900 + (i*40), y: 800 + (i*20), 
            targetX: 900 + (i*40), targetY: 800 + (i*20), 
            hp: 50, selected: false,
            animFrame: 0,
            isMoving: false,
            facing: 1,
            visualFacing: 1
        });
    }

    camera.x = 800 - canvas.width / 2;
    camera.y = 800 - canvas.height / 2;
    requestAnimationFrame(gameLoop);
}

function generateMapData() {
    tilemap = [];
    for (let y = 0; y < MAP_SIZE; y++) {
        let row = [];
        for (let x = 0; x < MAP_SIZE; x++) {
            const noise = Math.random();
            let type = 0;
            if (noise > 0.85) type = 1;
            if (noise > 0.95) type = 2;
            if (noise > 0.98) type = 3;
            row.push(type);
        }
        tilemap.push(row);
    }
}

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

/**
 * Enhanced Alpha Keying: 
 * Samples corners and uses a higher threshold to handle AI artifacts.
 */
function removeBackground(img) {
    const c = document.createElement('canvas');
    c.width = img.width;
    c.height = img.height;
    const tCtx = c.getContext('2d');
    tCtx.drawImage(img, 0, 0);
    const imageData = tCtx.getImageData(0, 0, c.width, c.height);
    const data = imageData.data;
    
    // Sample 4 corners for a robust background color estimate
    const cornerIndices = [
        0, 
        (c.width - 1) * 4, 
        (c.height - 1) * c.width * 4, 
        data.length - 4
    ];
    
    let kr = 0, kg = 0, kb = 0;
    cornerIndices.forEach(idx => {
        kr += data[idx]; kg += data[idx+1]; kb += data[idx+2];
    });
    kr /= 4; kg /= 4; kb /= 4;

    const threshold = 75; // More aggressive for sprites
    for (let i = 0; i < data.length; i += 4) {
        const r = data[i], g = data[i+1], b = data[i+2];
        const diff = Math.abs(r - kr) + Math.abs(g - kg) + Math.abs(b - kb);
        if (diff < threshold) {
            data[i+3] = 0;
        }
    }
    tCtx.putImageData(imageData, 0, 0);
    return c;
}

const getCoords = (e) => {
    const t = e.touches ? e.touches[0] : e;
    return { x: t.clientX, y: t.clientY };
};

function handleStart(e) {
    const { x, y } = getCoords(e);
    touchStartTime = Date.now();
    lastTouch = { x, y };
    if (interactionMode === 'select') {
        selection.active = true;
        selection.startX = x + camera.x;
        selection.startY = y + camera.y;
        selection.currentX = selection.startX;
        selection.currentY = selection.startY;
    }
}

function handleMove(e) {
    const { x, y } = getCoords(e);
    if (interactionMode === 'pan' && !selection.active && lastTouch) {
        camera.x = Math.max(0, Math.min(MAP_WIDTH - canvas.width, camera.x + (lastTouch.x - x)));
        camera.y = Math.max(0, Math.min(MAP_HEIGHT - canvas.height, camera.y + (lastTouch.y - y)));
        lastTouch = { x, y };
    } else if (selection.active) {
        selection.currentX = x + camera.x;
        selection.currentY = y + camera.y;
    }
}

function handleEnd(e) {
    const duration = Date.now() - touchStartTime;
    const { x, y } = lastTouch || { x: 0, y: 0 };
    const worldX = x + camera.x;
    const worldY = y + camera.y;

    if (selection.active) {
        const x1 = Math.min(selection.startX, selection.currentX);
        const x2 = Math.max(selection.startX, selection.currentX);
        const y1 = Math.min(selection.startY, selection.currentY);
        const y2 = Math.max(selection.startY, selection.currentY);
        const isTap = Math.abs(x1 - x2) < 10 && Math.abs(y1 - y2) < 10;
        if (isTap) {
            const clickedUnit = units.find(u => Math.sqrt((u.x - worldX)**2 + (u.y - worldY)**2) < 30);
            if (clickedUnit) {
                units.forEach(u => u.selected = false);
                clickedUnit.selected = true;
                selection.units = [clickedUnit];
            } else if (selection.units.length > 0) {
                selection.units.forEach(u => {
                    u.targetX = worldX + (Math.random() * 40 - 20);
                    u.targetY = worldY + (Math.random() * 40 - 20);
                });
            } else {
                units.forEach(u => u.selected = false);
                selection.units = [];
            }
        } else {
            selection.units = units.filter(u => {
                const inside = u.x >= x1 && u.x <= x2 && u.y >= y1 && u.y <= y2;
                u.selected = inside;
                return inside;
            });
        }
        selection.active = false;
        updateUI();
    } else if (interactionMode === 'pan' && duration < 200) {
        const clickedUnit = units.find(u => Math.sqrt((u.x - worldX)**2 + (u.y - worldY)**2) < 30);
        if (clickedUnit) {
            units.forEach(u => u.selected = false);
            clickedUnit.selected = true;
            selection.units = [clickedUnit];
        } else if (selection.units.length > 0) {
            selection.units.forEach(u => {
                u.targetX = worldX + (Math.random() * 40 - 20);
                u.targetY = worldY + (Math.random() * 40 - 20);
            });
        } else {
            units.forEach(u => u.selected = false);
            selection.units = [];
        }
        updateUI();
    }
    lastTouch = null;
}

canvas.addEventListener('mousedown', (e) => { if(e.button === 0) handleStart(e); });
canvas.addEventListener('mousemove', handleMove);
canvas.addEventListener('mouseup', handleEnd);
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleStart(e); }, { passive: false });
canvas.addEventListener('touchmove', (e) => { e.preventDefault(); handleMove(e); }, { passive: false });
canvas.addEventListener('touchend', (e) => { e.preventDefault(); handleEnd(e); }, { passive: false });

document.getElementById('mode-pan').onclick = () => setMode('pan');
document.getElementById('mode-select').onclick = () => setMode('select');
function setMode(mode) {
    interactionMode = mode;
    document.getElementById('mode-pan').classList.toggle('active-mode', mode === 'pan');
    document.getElementById('mode-select').classList.toggle('active-mode', mode === 'select');
}

async function fetchAIImage(prompt) {
    const data = await apiFetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
        method: 'POST',
        body: JSON.stringify({ instances: { prompt: prompt }, parameters: { sampleCount: 1 } })
    });
    if (!data.predictions?.[0]) throw new Error("Image prediction returned empty result.");
    const img = new Image();
    img.src = `data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`;
    await img.decode();
    return img;
}

async function refineImageWithAI(img, theme) {
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = img.width;
    tempCanvas.height = img.height;
    const tCtx = tempCanvas.getContext('2d');
    tCtx.drawImage(img, 0, 0);
    const base64Data = tempCanvas.toDataURL('image/png').split(',')[1];
    const prompt = `Refine this game asset tileset. Enhance detail for ${theme}. Keep 2x2 grid.`;
    const data = await apiFetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${apiKey}`, {
        method: 'POST',
        body: JSON.stringify({
            contents: [{ role: "user", parts: [{ text: prompt }, { inlineData: { mimeType: "image/png", data: base64Data } }] }],
            generationConfig: { responseModalities: ['TEXT', 'IMAGE'] }
        })
    });
    const refinedBase64 = data.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
    if (!refinedBase64) throw new Error("Refinement pass failed.");
    const refinedImg = new Image();
    refinedImg.src = `data:image/png;base64,${refinedBase64}`;
    await refinedImg.decode();
    return refinedImg;
}

async function sliceTileset(img) {
    const size = img.width / 2;
    assets.tiles = [];
    for (let y = 0; y < 2; y++) {
        for (let x = 0; x < 2; x++) {
            const tileCanvas = document.createElement('canvas');
            tileCanvas.width = TILE_SIZE;
            tileCanvas.height = TILE_SIZE;
            const tCtx = tileCanvas.getContext('2d');
            tCtx.drawImage(img, x * size, y * size, size, size, 0, 0, TILE_SIZE, TILE_SIZE);
            assets.tiles.push(tileCanvas);
        }
    }
}

async function processUnitSheet(img) {
    const keyedCanvas = removeBackground(img);
    const fw = keyedCanvas.width / 4;
    const fh = keyedCanvas.height;
    const tempCtx = keyedCanvas.getContext('2d');
    
    const newFrames = [];
    
    for(let i=0; i<4; i++) {
        // Find bounding box for each frame in the keyed canvas
        const frameData = tempCtx.getImageData(i * fw, 0, fw, fh);
        const data = frameData.data;
        let minX = fw, maxX = 0, minY = fh, maxY = 0;
        
        for (let y = 0; y < fh; y++) {
            for (let x = 0; x < fw; x++) {
                const alpha = data[(y * fw + x) * 4 + 3];
                if (alpha > 0) {
                    if (x < minX) minX = x;
                    if (x > maxX) maxX = x;
                    if (y < minY) minY = y;
                    if (y > maxY) maxY = y;
                }
            }
        }

        if (maxX < minX) { minX = 0; maxX = fw; minY = 0; maxY = fh; }
        
        const contentW = maxX - minX + 1;
        const contentH = maxY - minY + 1;
        
        const fCanvas = document.createElement('canvas');
        fCanvas.width = contentW;
        fCanvas.height = contentH;
        const fCtx = fCanvas.getContext('2d');
        // Critical: slice from the keyed canvas context
        fCtx.putImageData(tempCtx.getImageData(i * fw + minX, minY, contentW, contentH), 0, 0);
        
        newFrames.push({
            img: fCanvas,
            w: contentW,
            h: contentH,
            offsetX: minX - fw/2,
            offsetY: minY - fh 
        });
    }
    
    assets.soldierFrames = newFrames;
}

document.getElementById('gen-art-btn').onclick = async () => {
    const theme = document.getElementById('theme-prompt').value || "Cybernetic Desert";
    lastTheme = theme;
    document.getElementById('gen-overlay').classList.remove('hidden');
    try {
        const [tilesImg, unitSheet, baseImg] = await Promise.all([
            fetchAIImage(`Top-down 2x2 grid tileset of ${theme} ground textures`),
            fetchAIImage(`1x4 horizontal walk animation of one ${theme} soldier robot, white background, sprite sheet`),
            fetchAIImage(`Top-down isometric ${theme} command bunker building, white background`)
        ]);
        lastTilesetImg = tilesImg;
        
        await sliceTileset(tilesImg);
        await processUnitSheet(unitSheet);
        
        const bKeyed = removeBackground(baseImg);
        const bImg = new Image();
        bImg.onload = () => { assets.base = bImg; assets.baseReady = true; };
        bImg.src = bKeyed.toDataURL();
        
        generateMapData();
        document.getElementById('refine-art-btn').classList.remove('hidden');
    } catch (e) { showError(e.message); }
    finally { document.getElementById('gen-overlay').classList.add('hidden'); }
};

document.getElementById('refine-art-btn').onclick = async () => {
    document.getElementById('gen-overlay').classList.remove('hidden');
    try {
        const refinedTiles = await refineImageWithAI(lastTilesetImg, lastTheme);
        lastTilesetImg = refinedTiles;
        await sliceTileset(refinedTiles);
    } catch (e) { showError(e.message); }
    finally { document.getElementById('gen-overlay').classList.add('hidden'); }
};

function update() {
    units.forEach(u => {
        const dx = u.targetX - u.x;
        const dy = u.targetY - u.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        
        if (dist > 2) {
            u.isMoving = true;
            const moveX = (dx / dist) * UNIT_MOVE_SPEED;
            const moveY = (dy / dist) * UNIT_MOVE_SPEED;
            u.x += moveX;
            u.y += moveY;
            u.animFrame = (u.animFrame + (Math.sqrt(moveX*moveX + moveY*moveY) / STRIDE_LENGTH)) % 4;
            
            const targetFacing = dx >= 0 ? 1 : -1;
            if(Math.abs(dx) > 0.8) u.facing = targetFacing;
        } else {
            u.isMoving = false;
            u.x = u.targetX; u.y = u.targetY;
            u.animFrame = 0;
        }
        
        u.visualFacing += (u.facing - u.visualFacing) * 0.2;
    });
}

function draw() {
    ctx.fillStyle = '#0a0a0c';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(-camera.x, -camera.y);

    const startX = Math.max(0, Math.floor(camera.x / TILE_SIZE));
    const endX = Math.min(MAP_SIZE, Math.ceil((camera.x + canvas.width) / TILE_SIZE));
    const startY = Math.max(0, Math.floor(camera.y / TILE_SIZE));
    const endY = Math.min(MAP_SIZE, Math.ceil((camera.y + canvas.height) / TILE_SIZE));

    for (let y = startY; y < endY; y++) {
        for (let x = startX; x < endX; x++) {
            if (assets.tiles[tilemap[y][x]]) {
                ctx.drawImage(assets.tiles[tilemap[y][x]], x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
            } else {
                ctx.strokeStyle = '#1a1a1e';
                ctx.strokeRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
            }
        }
    }

    buildings.forEach(b => {
        if (assets.baseReady && assets.base) {
            ctx.drawImage(assets.base, b.x - 96, b.y - 120, 192, 192);
        } else {
            ctx.fillStyle = '#3b82f6';
            ctx.beginPath();
            ctx.roundRect(b.x - 40, b.y - 40, 80, 80, 8);
            ctx.fill();
        }
    });

    units.forEach(u => {
        ctx.save();
        ctx.translate(u.x, u.y);
        
        if (u.selected) {
            ctx.strokeStyle = '#22c55e'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.ellipse(0, 5, 20, 10, 0, 0, Math.PI * 2); ctx.stroke();
        }

        // Strictly mutually exclusive drawing to prevent stacking
        if (assets.soldierFrames && assets.soldierFrames.length === 4) {
            const frameIdx = Math.floor(u.animFrame) % 4;
            const frame = assets.soldierFrames[frameIdx];
            
            const renderFacing = u.visualFacing > 0 ? 1 : -1;
            ctx.scale(renderFacing, 1);
            
            const baseH = 80;
            const scale = baseH / (assets.soldierFrames[0].h || baseH);
            const dw = frame.w * scale;
            const dh = frame.h * scale;

            ctx.drawImage(frame.img, -dw/2, -dh + 5, dw, dh);
        } else {
            ctx.fillStyle = u.selected ? '#22c55e' : '#ffffff';
            ctx.beginPath(); ctx.arc(0, 0, 12, 0, Math.PI * 2); ctx.fill();
        }
        ctx.restore();
    });

    if (selection.active) {
        ctx.strokeStyle = '#22c55e'; ctx.setLineDash([5, 5]);
        ctx.strokeRect(selection.startX, selection.startY, selection.currentX - selection.startX, selection.currentY - selection.startY);
        ctx.fillStyle = 'rgba(34, 197, 94, 0.1)';
        ctx.fillRect(selection.startX, selection.startY, selection.currentX - selection.startX, selection.currentY - selection.startY);
        ctx.setLineDash([]);
    }
    ctx.restore();
}

function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
function updateUI() {
    const panel = document.getElementById('selection-box');
    if (selection.units.length > 0) {
        panel.classList.remove('hidden');
        document.getElementById('unit-name').innerText = selection.units.length > 1 ? `${selection.units.length} Units` : "Field Unit";
    } else panel.classList.add('hidden');
}
document.getElementById('btn-deselect').onclick = () => { units.forEach(u => u.selected = false); selection.units = []; updateUI(); };
window.oncontextmenu = (e) => e.preventDefault();
init();
</script>
</body>
</html>
